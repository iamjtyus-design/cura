name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-and-scan:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: sh scripts/secret_scan.sh
      - name: Swift package tests
        run: swift test
      - name: Phase 0 smoke tests
        run: swift run CuraSmokeTests
      - name: Native iOS scheme tests
        run: xcodebuild -project Cura.xcodeproj -scheme CuraApp -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5' test
